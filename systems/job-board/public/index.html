<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Board - Niche Job Postings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0a0a0f; --bg-secondary: #111118; --bg-card: #1a1a24; --bg-input: #252532; --accent: #22c55e; --success: #10b981; --text: #ffffff; --text-secondary: #9ca3af; --text-muted: #6b7280; --border: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text); min-height: 100vh; }
        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #16a34a); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .logo-text { font-size: 1.25rem; font-weight: 700; }
        .logo-text span { background: linear-gradient(135deg, var(--accent), #16a34a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats-bar { background: var(--bg-secondary); padding: 1rem 2rem; border-bottom: 1px solid var(--border); }
        .stats-content { max-width: 1400px; margin: 0 auto; display: flex; gap: 3rem; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #16a34a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
        .main { max-width: 1400px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 1024px) { .main { grid-template-columns: 1fr; } }
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
        .panel-header { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 1.1rem; font-weight: 600; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem 1rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { padding: 0.875rem 1.5rem; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #16a34a); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3); }
        .job-list { max-height: 400px; overflow-y: auto; }
        .job-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .job-title { font-weight: 600; font-size: 1rem; }
        .job-company { font-size: 0.85rem; color: var(--text-muted); }
        .job-meta { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
        .job-salary { font-weight: 600; color: var(--accent); }
        .tag { display: inline-block; padding: 0.25rem 0.5rem; background: rgba(34, 197, 94, 0.2); color: var(--accent); border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
        .quick-actions { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .quick-btn { padding: 0.5rem 1rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; }
        .quick-btn:hover { background: var(--accent); color: white; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; background: var(--bg-card); border: 1px solid var(--success); border-radius: 10px; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">💼</div>
                <div class="logo-text">Job <span>Board</span></div>
            </div>
            <div style="color: var(--text-secondary); font-size: 0.85rem;">Niche Job Postings</div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stats-content">
            <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Jobs</div></div>
            <div class="stat"><div class="stat-value" id="stat-active">0</div><div class="stat-label">Active</div></div>
            <div class="stat"><div class="stat-value">$250</div><div class="stat-label">Per Posting</div></div>
        </div>
    </div>

    <main class="main">
        <div class="panel">
            <div class="panel-header"><h2>Create Job Posting</h2></div>
            
            <div class="form-group">
                <label>Job Category</label>
                <select id="category">
                    <option value="webflow">🌊 Webflow Developers</option>
                    <option value="framer">🎨 Framer Designers</option>
                    <option value="bubble">🫧 No-Code Developers</option>
                    <option value="web3">⛓️ Web3 Engineers</option>
                    <option value="ai">🤖 AI/ML Engineers</option>
                    <option value="react">⚛️ React Developers</option>
                    <option value="node">🟢 Node.js Developers</option>
                </select>
            </div>

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" id="title" placeholder="Senior Webflow Designer">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="company" placeholder="TechStartup Inc">
                </div>
                <div class="form-group">
                    <label>Salary Range</label>
                    <input type="text" id="salary" placeholder="$80-120k">
                </div>
            </div>

            <div class="form-group">
                <label>Location</label>
                <select id="location">
                    <option value="remote">🌍 Remote (Worldwide)</option>
                    <option value="usa">🇺🇸 Remote (USA)</option>
                    <option value="europe">🇪🇺 Remote (Europe)</option>
                    <option value="onsite">📍 On-site</option>
                </select>
            </div>

            <div class="form-group">
                <label>Required Skills (comma separated)</label>
                <input type="text" id="skills" placeholder="Webflow, Finsweet, Memberstack">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Describe the role and requirements..."></textarea>
            </div>

            <button class="btn btn-primary" onclick="createJob()"><span>✨</span> Create Job Posting</button>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h2>Job Listings</h2>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="filterJobs('all')">All</button>
                    <button class="quick-btn" onclick="filterJobs('remote')">Remote</button>
                    <button class="quick-btn" onclick="filterJobs('salary')">High Salary</button>
                </div>
            </div>
            <div class="job-list" id="jobList">
                <div class="empty-state"><p>No job postings yet</p></div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"><span>✓</span><span id="toastMessage">Success!</span></div>

    <script>
        const API = window.location.origin;
        let jobs = [];

        function showToast(m) {
            document.getElementById('toastMessage').textContent = m;
            document.getElementById('toast').classList.add('show');
            setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
        }

        function loadJobs() {
            fetch(`${API}/api/jobs`).then(r => r.json()).then(data => {
                jobs = data;
                renderJobs();
            });
        }

        function renderJobs() {
            const list = document.getElementById('jobList');
            if (jobs.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No job postings</p></div>';
                return;
            }

            const categories = {
                webflow: '🌊', framer: '🎨', bubble: '🫧', web3: '⛓️', ai: '🤖', react: '⚛️', node: '🟢'
            };
            const locations = {
                remote: '🌍 Remote', usa: '🇺🇸 USA', europe: '🇪🇺 Europe', onsite: '📍 On-site'
            };

            list.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-header">
                        <div>
                            <div class="job-title">${categories[job.category] || '💼'} ${job.title}</div>
                            <div class="job-company">${job.company}</div>
                        </div>
                        <span class="job-salary">${job.salary}</span>
                    </div>
                    <div class="job-meta">
                        <span>${locations[job.location] || job.location}</span>
                        <span>•</span>
                        <span>${new Date(job.created_at).toLocaleDateString()}</span>
                    </div>
                    <div style="margin-top: 0.5rem;">
                        ${(job.skills || []).slice(0, 3).map(s => `<span class="tag">${s}</span>`).join(' ')}
                    </div>
                </div>
            `).join('');
        }

        async function createJob() {
            const title = document.getElementById('title').value;
            if (!title) { showToast('Enter job title'); return; }

            const skills = document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s);

            await fetch(`${API}/api/jobs`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title,
                    category: document.getElementById('category').value,
                    company: document.getElementById('company').value || 'Company',
                    salary: document.getElementById('salary').value || '$80-120k',
                    location: document.getElementById('location').value,
                    skills,
                    description: document.getElementById('description').value
                })
            });

            document.getElementById('title').value = '';
            loadJobs();
            loadStats();
            showToast('Job posting created!');
        }

        function filterJobs(filter) {
            showToast(`Filtered: ${filter}`);
        }

        async function loadStats() {
            const res = await fetch(`${API}/api/stats`);
            const s = await res.json();
            document.getElementById('stat-total').textContent = s.totalJobs;
            document.getElementById('stat-active').textContent = s.activeJobs;
        }

        loadJobs();
        loadStats();
    </script>
</body>
</html>
