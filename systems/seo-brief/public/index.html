<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Brief Builder - AI SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #1a1a24;
            --bg-input: #252532;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }

        .logo-text span {
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats Bar */
        .stats-bar {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .stats-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 3rem;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Main Layout */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .main { grid-template-columns: 1fr; }
        }

        /* Form Panel */
        .form-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .panel-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .panel-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Buttons */
        .btn {
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #a855f7);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        /* Brief Panel */
        .brief-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .brief-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .brief-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .brief-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
        }

        .brief-content {
            padding: 1.5rem;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
        }

        .brief-section {
            margin-bottom: 2rem;
        }

        .brief-section h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brief-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .brief-tag {
            padding: 0.25rem 0.75rem;
            background: var(--accent-glow);
            color: var(--accent);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .brief-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.8;
            color: var(--text-secondary);
            white-space: pre-wrap;
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .structure-item {
            background: var(--bg-input);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .structure-item h4 {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .structure-item p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Saved Briefs */
        .saved-briefs {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .saved-briefs h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .saved-item:hover {
            background: var(--bg-card);
        }

        .saved-item-info {
            flex: 1;
        }

        .saved-item-title {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .saved-item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--success);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <div class="logo-text">SEO Brief <span>Builder</span></div>
            </div>
            <div style="color: var(--text-secondary); font-size: 0.85rem;">
                AI-Powered Content Briefs
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stats-content">
            <div class="stat">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Briefs</div>
            </div>
            <div class="stat">
                <div class="stat-value">$49-99</div>
                <div class="stat-label">Price/mo</div>
            </div>
            <div class="stat">
                <div class="stat-value">2 min</div>
                <div class="stat-label">Avg. Time</div>
            </div>
        </div>
    </div>

    <main class="main">
        <div class="form-panel">
            <div class="panel-header">
                <h2>Create New Brief</h2>
            </div>

            <div class="form-group">
                <label>Target Industry</label>
                <select id="industry">
                    <option value="dentists">Dentists / Dental Practices</option>
                    <option value="lawyers">Personal Injury Lawyers</option>
                    <option value="realestate">Real Estate Agents</option>
                    <option value="plumbers">Plumbing Services</option>
                    <option value="hvac">HVAC Companies</option>
                    <option value="roofers">Roofing Contractors</option>
                    <option value="accountants">Accountants / CPAs</option>
                    <option value="restaurants">Restaurants</option>
                    <option value="gyms">Gyms / Fitness Centers</option>
                    <option value="photographers">Photographers</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Main Keyword</label>
                    <input type="text" id="keyword" placeholder="e.g., teeth whitening">
                </div>
                <div class="form-group">
                    <label>Word Count</label>
                    <select id="wordCount">
                        <option value="1500">1,500 words</option>
                        <option value="2000" selected>2,000 words</option>
                        <option value="2500">2,500 words</option>
                        <option value="3000">3,000 words</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Competitor URL (optional)</label>
                <input type="text" id="competitorUrl" placeholder="https://example.com">
            </div>

            <div class="form-group">
                <label>Additional Notes</label>
                <textarea id="notes" placeholder="Any specific points to include..."></textarea>
            </div>

            <button class="btn btn-primary" id="generateBtn" onclick="generateBrief()">
                <span>✨</span> Generate Brief
            </button>

            <div class="saved-briefs">
                <h3>Saved Briefs</h3>
                <div id="savedList"></div>
            </div>
        </div>

        <div class="brief-panel">
            <div class="brief-header">
                <h2>Generated Brief</h2>
                <div class="brief-actions">
                    <button class="btn btn-secondary btn-sm" onclick="copyBrief()">📋 Copy</button>
                    <button class="btn btn-secondary btn-sm" onclick="downloadBrief()">📥 Download</button>
                    <button class="btn btn-secondary btn-sm" onclick="saveBrief()">💾 Save</button>
                </div>
            </div>
            <div class="brief-content" id="briefContent">
                <div class="empty-state">
                    <div class="icon">📝</div>
                    <p>Fill in the form and click "Generate Brief" to create your SEO content brief</p>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <span>✓</span>
        <span id="toastMessage">Success!</span>
    </div>

    <script>
        const API_URL = window.location.origin;
        let currentBrief = null;
        let savedBriefs = [];

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Generate Brief
        async function generateBrief() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Generating...';

            const data = {
                keyword: document.getElementById('keyword').value || 'target keyword',
                industry: document.getElementById('industry').value,
                wordCount: document.getElementById('wordCount').value,
                competitorUrl: document.getElementById('competitorUrl').value,
                notes: document.getElementById('notes').value
            };

            try {
                const res = await fetch(`${API_URL}/api/briefs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const brief = await res.json();
                currentBrief = brief;
                renderBrief(brief);
                loadStats();
                showToast('Brief generated successfully!');
            } catch (err) {
                showToast('Error generating brief');
                console.error(err);
            }

            btn.disabled = false;
            btn.innerHTML = '<span>✨</span> Generate Brief';
        }

        // Render Brief
        function renderBrief(brief) {
            const container = document.getElementById('briefContent');
            
            const textOutput = `═══════════════════════════════════════════════════════════════
                    SEO CONTENT BRIEF: ${brief.keyword.toUpperCase()}
═══════════════════════════════════════════════════════════════

📋 TARGET AUDIENCE
   ${brief.industry}

📊 CONTENT SPECIFICATIONS
   • Word Count: ${brief.specifications.wordCount.toLocaleString()} words
   • Reading Level: ${brief.specifications.readingLevel}
   • Format: ${brief.specifications.format}

🎯 PRIMARY KEYWORD: ${brief.keyword}

📈 SECONDARY KEYWORDS:
${brief.secondaryKeywords.map(k => `   • ${k}`).join('\n')}

🔍 KEY PROBLEMS TO ADDRESS:
${brief.problems.map((p, i) => `   ${i + 1}. ${p}`).join('\n')}

📝 RECOMMENDED STRUCTURE:

1. INTRODUCTION (${brief.structure.introduction.percentage}) - ${brief.structure.introduction.words.toLocaleString()} words
   ${brief.structure.introduction.points.map(p => `   • ${p}`).join('\n   ')}

2. WHAT IS [TOPIC]? (${brief.structure.whatIs.percentage}) - ${brief.structure.whatIs.words.toLocaleString()} words
   ${brief.structure.whatIs.points.map(p => `   • ${p}`).join('\n   ')}

3. TOP BENEFITS (${brief.structure.benefits.percentage}) - ${brief.structure.benefits.words.toLocaleString()} words
   ${brief.structure.benefits.points.map(p => `   • ${p}`).join('\n   ')}

4. HOW-TO GUIDE (${brief.structure.howTo.percentage}) - ${brief.structure.howTo.words.toLocaleString()} words
   ${brief.structure.howTo.points.map(p => `   • ${p}`).join('\n   ')}

5. FAQ SECTION (${brief.structure.faq.percentage}) - ${brief.structure.faq.words.toLocaleString()} words
   ${brief.structure.faq.points.map(p => `   • ${p}`).join('\n   ')}

6. CONCLUSION (${brief.structure.conclusion.percentage}) - ${brief.structure.conclusion.words.toLocaleString()} words
   ${brief.structure.conclusion.points.map(p => `   • ${p}`).join('\n   ')}

🔗 COMPETITOR ANALYSIS: ${brief.competitorAnalysis}

📝 NOTES: ${brief.notes}

📈 SEO METRICS TARGET:
   • Traffic: ${brief.metrics.targetTraffic}
   • Conversion: ${brief.metrics.conversionRate}
   • Ranking Time: ${brief.metrics.rankingTime}

═══════════════════════════════════════════════════════════════`;

            container.innerHTML = `
                <div class="brief-section">
                    <h3>Brief Overview</h3>
                    <div class="brief-meta">
                        <span class="brief-tag">${brief.keyword}</span>
                        <span class="brief-tag">${brief.specifications.wordCount.toLocaleString()} words</span>
                        <span class="brief-tag">${brief.industry}</span>
                    </div>
                </div>
                
                <div class="brief-section">
                    <h3>Content Structure</h3>
                    <div class="structure-item">
                        <h4>📖 Introduction (${brief.structure.introduction.percentage})</h4>
                        <p>${brief.structure.introduction.words.toLocaleString()} words - ${brief.structure.introduction.points.join(', ')}</p>
                    </div>
                    <div class="structure-item">
                        <h4>💡 What Is [Topic]? (${brief.structure.whatIs.percentage})</h4>
                        <p>${brief.structure.whatIs.words.toLocaleString()} words - ${brief.structure.whatIs.points.join(', ')}</p>
                    </div>
                    <div class="structure-item">
                        <h4>⭐ Top Benefits (${brief.structure.benefits.percentage})</h4>
                        <p>${brief.structure.benefits.words.toLocaleString()} words - ${brief.structure.benefits.points.join(', ')}</p>
                    </div>
                    <div class="structure-item">
                        <h4>📋 How-To Guide (${brief.structure.howTo.percentage})</h4>
                        <p>${brief.structure.howTo.words.toLocaleString()} words - ${brief.structure.howTo.points.join(', ')}</p>
                    </div>
                    <div class="structure-item">
                        <h4>❓ FAQ Section (${brief.structure.faq.percentage})</h4>
                        <p>${brief.structure.faq.words.toLocaleString()} words - ${brief.structure.faq.points.join(', ')}</p>
                    </div>
                    <div class="structure-item">
                        <h4>🎯 Conclusion (${brief.structure.conclusion.percentage})</h4>
                        <p>${brief.structure.conclusion.words.toLocaleString()} words - ${brief.structure.conclusion.points.join(', ')}</p>
                    </div>
                </div>

                <div class="brief-section">
                    <h3>Full Brief (Copy/Download)</h3>
                    <div class="brief-text" id="briefText">${textOutput}</div>
                </div>
            `;
        }

        // Copy Brief
        function copyBrief() {
            const text = document.getElementById('briefText')?.textContent;
            if (text) {
                navigator.clipboard.writeText(text);
                showToast('Copied to clipboard!');
            }
        }

        // Download Brief
        function downloadBrief() {
            const text = document.getElementById('briefText')?.textContent;
            if (text) {
                const blob = new Blob([text], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `seo-brief-${currentBrief?.keyword || 'untitled'}.txt`;
                a.click();
                showToast('Brief downloaded!');
            }
        }

        // Save Brief
        async function saveBrief() {
            if (!currentBrief) return;
            
            savedBriefs.unshift({
                id: currentBrief.id,
                keyword: currentBrief.keyword,
                industry: currentBrief.industry,
                date: new Date().toLocaleDateString()
            });
            renderSavedBriefs();
            showToast('Brief saved!');
        }

        // Load Saved Briefs
        async function loadSavedBriefs() {
            try {
                const res = await fetch(`${API_URL}/api/briefs`);
                const briefs = await res.json();
                savedBriefs = briefs.slice(0, 10).map(b => ({
                    id: b.id,
                    keyword: b.keyword,
                    industry: b.industry,
                    date: new Date(b.created_at).toLocaleDateString()
                }));
                renderSavedBriefs();
            } catch (err) {
                console.error('Error loading briefs:', err);
            }
        }

        // Render Saved Briefs
        function renderSavedBriefs() {
            const list = document.getElementById('savedList');
            if (savedBriefs.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem;">No saved briefs yet</p>';
                return;
            }
            list.innerHTML = savedBriefs.map(b => `
                <div class="saved-item" onclick="loadBrief('${b.id}')">
                    <div class="saved-item-info">
                        <div class="saved-item-title">${b.keyword}</div>
                        <div class="saved-item-date">${b.date}</div>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); deleteBrief('${b.id}')">🗑️</button>
                </div>
            `).join('');
        }

        // Load Brief
        async function loadBrief(id) {
            try {
                const res = await fetch(`${API_URL}/api/briefs/${id}`);
                const brief = await res.json();
                currentBrief = brief;
                renderBrief(brief);
                showToast('Brief loaded!');
            } catch (err) {
                showToast('Error loading brief');
            }
        }

        // Delete Brief
        async function deleteBrief(id) {
            try {
                await fetch(`${API_URL}/api/briefs/${id}`, { method: 'DELETE' });
                savedBriefs = savedBriefs.filter(b => b.id !== id);
                renderSavedBriefs();
                loadStats();
                showToast('Brief deleted!');
            } catch (err) {
                showToast('Error deleting brief');
            }
        }

        // Load Stats
        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/api/stats`);
                const stats = await res.json();
                document.getElementById('stat-total').textContent = stats.totalBriefs;
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

        // Init
        loadStats();
        loadSavedBriefs();
    </script>
</body>
</html>
